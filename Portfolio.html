  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: var(--sans); }
  html { scroll-behavior: auto; }
  body {

    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    cursor: none;
    overflow-x: hidden;
  }
  @media (pointer: coarse) { body { cursor: auto; } }
  @media (max-width: 639px) { body { cursor: auto; } }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: none; }
  @media (pointer: coarse), (max-width: 639px) { button { cursor: auto; } }
  ::selection { background: var(--ink); color: var(--paper); }
  img, svg { max-width: 100%; display: block; }
  body { transition: background 0.5s var(--ease-out), color 0.5s var(--ease-out); }
  body::-webkit-scrollbar { width: 0; }

  .noise {
    position: fixed; inset: 0; pointer-events: none; z-index: 2;
